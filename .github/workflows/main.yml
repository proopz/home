name: Print GitHub Secrets

on:
  push:
    branches:
      - main

jobs:
  print-secrets:
    runs-on: ubuntu-latest
    steps:
    - name: Print GitHub Secrets
      run: |
        echo "Authentication Host: ${{ secrets.AUTH_HOST }}"
        echo "Authentication Username: ${{ secrets.AUTH_UN }}"
        echo "Authentication Token: ${{ secrets.AUTHTOK }}"
        echo "Authentication Target: ${{ secrets.AUTH_TO }}"
